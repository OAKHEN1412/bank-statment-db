<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Bank Statement DB{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
      <i class="bi bi-bank2 me-2"></i>Bank Statement DB
    </a>
    <div class="navbar-nav ms-auto flex-row gap-2 align-items-center">
      <a class="nav-link text-white {% if request.endpoint == 'index' %}fw-bold{% endif %}" href="{{ url_for('index') }}">
        <i class="bi bi-upload me-1"></i>อัปโหลด
      </a>
      <a class="nav-link text-white {% if request.endpoint == 'view' %}fw-bold{% endif %}" href="{{ url_for('view') }}">
        <i class="bi bi-table me-1"></i>ดูข้อมูล
      </a>
      <a class="nav-link text-white {% if request.endpoint == 'check' %}fw-bold{% endif %}" href="{{ url_for('check') }}">
        <i class="bi bi-check2-square me-1"></i>เช็ค Statement
      </a>
      <a class="nav-link text-white position-relative {% if request.endpoint == 'update_page' %}fw-bold{% endif %}"
         href="{{ url_for('update_page') }}" id="nav-update-link" title="อัพเดตโปรแกรม">
        <i class="bi bi-arrow-repeat me-1"></i>
        <span id="update-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              style="display:none; font-size:0.55rem">NEW</span>
      </a>
      <span class="text-white-50 small ms-1" style="font-size:0.75rem">v{{ app_version }}</span>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Silent update check once per browser session
(function () {
  if (sessionStorage.getItem('updateChecked')) return;
  sessionStorage.setItem('updateChecked', '1');
  fetch('/update/check')
    .then(r => r.json())
    .then(data => {
      if (data.has_update) {
        var badge = document.getElementById('update-badge');
        if (badge) badge.style.display = '';
      }
    })
    .catch(function () {});
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
